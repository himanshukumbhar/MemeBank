name: Build MemeBank APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Recreate Flutter Project Structure
        run: |
          mv main.dart main_backup.dart
          mv pubspec.yaml pubspec_backup.yaml
          flutter create . --project-name=memebank --platforms=android
          rm lib/main.dart
          mv main_backup.dart lib/main.dart
          mv pubspec_backup.yaml pubspec.yaml

      - name: Fix minSdkVersion for AdMob
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 21/' android/app/build.gradle

      - name: Fix Kotlin Gradle Plugin Version
        run: |
          if [ -f android/settings.gradle ]; then
            sed -i 's/id "org.jetbrains.kotlin.android" version .*/id "org.jetbrains.kotlin.android" version "1.9.0" apply false/' android/settings.gradle
          fi
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' android/build.gradle
          fi

      - name: Add AdMob App ID to AndroidManifest
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          REAL_APP_ID="ca-app-pub-7157971751129903~1285422815"
          META_DATA="<meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$REAL_APP_ID\"/>"
          sed -i "s|<application|<application>\n        $META_DATA|" $MANIFEST_PATH

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: memebank-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          
